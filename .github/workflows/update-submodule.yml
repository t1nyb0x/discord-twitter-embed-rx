name: Update dashboard submodule

on:
  repository_dispatch:
    types: [dashboard-updated]

jobs:
  update-submodule:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update dashboard submodule
        run: git submodule update --remote dashboard

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and force-push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git checkout -B chore/update-dashboard-submodule
          git add dashboard
          git commit -m "chore(deps): update dashboard submodule"
          git push --force origin chore/update-dashboard-submodule

      - name: Create or update Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh pr view chore/update-dashboard-submodule --json state -q '.state' 2>/dev/null | grep -q "OPEN"; then
            echo "PR already exists, force-push updated it"
          else
            gh pr create \
              --base develop \
              --head chore/update-dashboard-submodule \
              --title "chore(deps): update dashboard submodule" \
              --body "Dashboard リポジトリの更新を検知したため、サブモジュールのポインタを更新します。

          Triggered by: ${{ github.event.client_payload.sha }}" \
              --label "dependencies"
          fi
