name: deploy
on:
  workflow_run:
    workflows: [push-image]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    # push-imageワークフローが成功した場合のみ実行
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Deploy Application
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$VPS_HOST" -p "$SSH_PORT" \
          "cd TwitterRX && docker compose pull && docker compose up -d --force-recreate --remove-orphans"

      - name: Verify Deployment
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          sleep 10
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$VPS_HOST" -p "$SSH_PORT" \
          "cd TwitterRX && docker compose ps --format 'table {{.Name}}\t{{.Status}}'"