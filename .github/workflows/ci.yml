name: CI

on:
  pull_request:
    branches: ["main", "develop"]

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: "https://npm.pkg.github.com"
          scope: "@twitterrx"

      - name: Sync lockfile with submodule changes
        run: npm install --package-lock-only

      - name: Install dependencies
        run: npm ci

      - name: Install dashboard dependencies
        run: npm install --prefix dashboard
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache node_modules
        uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            dashboard/node_modules
            packages/*/node_modules
          key: deps-${{ github.run_id }}

  test:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            dashboard/node_modules
            packages/*/node_modules
          key: deps-${{ github.run_id }}

      - name: Run oxlint
        run: npx oxlint src/

      - name: Run oxfmt (format check)
        run: npx oxfmt --check src/

      - name: Run all tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/coverage-final.json
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            dashboard/node_modules
            packages/*/node_modules
          key: deps-${{ github.run_id }}

      - name: Build TypeScript
        run: npm run build

      - name: Check build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi
          echo "Build successful"

  test-dashboard:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            dashboard/node_modules
            packages/*/node_modules
          key: deps-${{ github.run_id }}

      - name: Run dashboard tests
        run: npm run test:dashboard

  build-dashboard:
    runs-on: ubuntu-latest
    needs: test-dashboard

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            dashboard/node_modules
            packages/*/node_modules
          key: deps-${{ github.run_id }}

      - name: Build Dashboard
        run: |
          npm run db:generate --workspace=@twitterrx/dashboard
          npm run build --workspace=@twitterrx/dashboard

      - name: Check Dashboard build output
        run: |
          if [ ! -d "dashboard/dist" ]; then
            echo "Dashboard build failed: dist directory not found"
            exit 1
          fi
          echo "Dashboard build successful"
